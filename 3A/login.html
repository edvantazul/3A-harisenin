<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-[#FFFCE9] min-h-screen flex flex-col font-sans">

  <header class="w-full bg-white border-b border-gray-100 shadow-sm py-4 px-6 lg:px-20">
      <img src="./Logo2.svg" alt="Logo" class="h-8">
  </header>

  <main class="flex-grow flex items-center justify-center p-4">
    
    <div class="w-full max-w-md bg-white p-10 rounded-lg shadow-sm border border-gray-100">
      
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-[#333333]">Masuk ke Akun</h1>
        <p class="text-sm text-gray-500 mt-2">Yuk, lanjutin belajarmu di video belajar.</p>
      </div>

      <form class="space-y-5">
        
        <div>
          <label class="block text-sm text-gray-700 mb-1">E-Mail <span class="text-red-500">*</span></label>
          <input type="email" class="w-full px-4 py-3 border border-gray-200 rounded-md focus:ring-1 focus:ring-green-500 focus:outline-none transition-all">
        </div>

        <div class="relative">
          <label class="block text-sm text-gray-700 mb-1">Kata Sandi <span class="text-red-500">*</span></label>
          <div class="relative">
            <input type="password" class="w-full px-4 py-3 border border-gray-200 rounded-md focus:ring-1 focus:ring-green-500 focus:outline-none transition-all">
            <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
              </svg>
            </button>
          </div>
          <div class="text-right mt-2">
            <a href="#" class="text-sm text-gray-600 hover:underline">Lupa Password?</a>
          </div>
        </div>

        <div class="space-y-3 pt-2">
          <button type="submit" class="w-full bg-[#3ECF4C] hover:bg-green-600 text-white font-semibold py-3 rounded-md transition-all cursor-pointer">
             Masuk
          </button>

         <a href="register.html" class="block w-full text-center bg-[#E8FADF] hover:bg-green-100 text-[#3ECF4C] font-semibold py-3 rounded-md transition-all">
           Daftar
        </a>
</div>

        <div class="relative my-6 text-center">
          <hr class="border-gray-100">
          <span class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white px-3 text-xs text-gray-400">atau</span>
        </div>

        <button type="button" class="w-full flex items-center justify-center gap-3 border border-gray-200 py-3 rounded-md hover:bg-gray-50 transition-all">
          <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" class="h-5" alt="Google">
          <span class="text-sm font-medium text-gray-700">Masuk dengan Google</span>
        </button>

      </form>
    </div>

  </main>
</body>


</html>
