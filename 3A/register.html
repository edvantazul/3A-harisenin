<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#FFFCE9] min-h-screen flex flex-col font-sans">

  <header class="w-full bg-white border-b border-gray-100 shadow-sm py-4 px-6 lg:px-20">
      <img src="./Logo2.svg" alt="Logo" class="h-8">
  </header>

  <main class="flex-grow flex items-center justify-center p-4 py-10">
    
    <div class="w-full max-w-lg bg-white p-8 md:p-10 rounded-lg shadow-sm border border-gray-100">
      
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-[#333333]">Pendaftaran Akun</h1>
        <p class="text-sm text-gray-500 mt-2">Yuk, daftarkan akunmu sekarang juga!</p>
      </div>

      <form class="space-y-4">
        
        <div>
          <label class="block text-sm text-gray-700 mb-1">Nama Lengkap <span class="text-red-500">*</span></label>
          <input type="text" class="w-full px-4 py-2.5 border border-gray-200 rounded-md focus:ring-1 focus:ring-green-500 focus:outline-none" placeholder="Masukkan nama lengkap">
        </div>

        <div>
          <label class="block text-sm text-gray-700 mb-1">E-Mail <span class="text-red-500">*</span></label>
          <input type="email" class="w-full px-4 py-2.5 border border-gray-200 rounded-md focus:ring-1 focus:ring-green-500 focus:outline-none" placeholder="alamat@email.com">
        </div>

        <div>
          <label class="block text-sm text-gray-700 mb-1">No. Hp <span class="text-red-500">*</span></label>
          <div class="flex gap-2">
            <div class="flex items-center gap-1 px-3 border border-gray-200 rounded-md bg-gray-50">
              <span class="text-xl">🇮🇩</span>
              <span class="text-sm text-gray-600">+62</span>
            </div>
            <input type="tel" class="flex-1 px-4 py-2.5 border border-gray-200 rounded-md focus:ring-1 focus:ring-green-500 focus:outline-none" placeholder="8123456789">
          </div>
        </div>

        <div>
          <label class="block text-sm text-gray-700 mb-1">Kata Sandi <span class="text-red-500">*</span></label>
          <input type="password" class="w-full px-4 py-2.5 border border-gray-200 rounded-md focus:ring-1 focus:ring-green-500 focus:outline-none">
        </div>

        <div>
          <label class="block text-sm text-gray-700 mb-1">Konfirmasi Kata Sandi <span class="text-red-500">*</span></label>
          <input type="password" class="w-full px-4 py-2.5 border border-gray-200 rounded-md focus:ring-1 focus:ring-green-500 focus:outline-none">
        </div>

       <div class="pt-4 space-y-3">
        <button type="submit" class="w-full bg-[#3ECF4C] hover:bg-green-600 text-white font-semibold py-3 rounded-md transition-all cursor-pointer">
             Daftar
             </button>

        <a href="login.html" class="block w-full text-center bg-[#E8FADF] hover:bg-green-100 text-[#3ECF4C] font-semibold py-3 rounded-md transition-all">
            Masuk
        </a>
</div>

      </form>

      <div class="relative my-8 text-center">
        <hr class="border-gray-100">
        <span class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white px-3 text-xs text-gray-400">atau</span>
      </div>

      <button class="w-full flex items-center justify-center gap-3 border border-gray-200 py-3 rounded-md hover:bg-gray-50">
        <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" class="h-5" alt="Google">
        <span class="text-sm font-medium text-gray-700">Daftar dengan Google</span>
      </button>

    </div>
  </main>
</body>
</html>
